name: Collect DevEx Metrics

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      owner:
        description: "GitHub org or user to collect metrics for"
        required: true
      owner_type:
        description: "org or user"
        required: false
        default: "org"

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - run: npm run build

      - name: Collect metrics
        env:
          GITHUB_TOKEN: ${{ secrets.METRICS_GITHUB_TOKEN }}
        run: |
          OWNER="${{ github.event.inputs.owner || github.repository_owner }}"
          TYPE="${{ github.event.inputs.owner_type || 'org' }}"
          node dist/index.js "$OWNER" "$TYPE"

      - name: Commit cached data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: update metrics data [skip ci]"
          git push
