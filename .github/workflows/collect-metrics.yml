name: Collect DevEx Metrics

on:
  push:
    paths:
      - ".github/workflows/collect-metrics.yml"
  schedule:
    # Run daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      owner:
        description: "GitHub org or user to collect metrics for"
        required: true
      owner_type:
        description: "org or user"
        required: false
        default: "org"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - run: npm run build

      # Restore cached data from previous runs
      - name: Restore data cache
        id: cache-data
        uses: actions/cache@v4
        with:
          path: data
          key: metrics-data-${{ github.repository_owner }}
          restore-keys: |
            metrics-data-

      - name: Collect metrics
        env:
          GITHUB_TOKEN: ${{ secrets.METRICS_GITHUB_TOKEN }}
          APP_ID: ${{ vars.APP_ID }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
        run: |
          OWNER="${{ github.event.inputs.owner || github.repository_owner }}"
          TYPE="${{ github.event.inputs.owner_type || 'org' }}"
          node dist/index.js "$OWNER" "$TYPE"

      # Cache is automatically saved after the job completes
      # (actions/cache saves on cache miss or key change)

      # Build the GitHub Pages site from the report
      - name: Build pages site
        run: |
          OWNER="${{ github.event.inputs.owner || github.repository_owner }}"
          mkdir -p _site
          node dist/build-pages.js "$OWNER"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: collect
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
