name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - run: npm run build

      - run: npm test

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - run: npm run lint

  mutation:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - run: npm run build

      - name: Run mutation tests
        run: npm run mutation:ci

      - name: Post mutation summary
        if: always()
        run: node scripts/mutation-summary.mjs >> $GITHUB_STEP_SUMMARY
